name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test (sandbox integration tests skipped — see executor job)
        run: pytest -v

  executor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            executor/target
          key: cargo-${{ runner.os }}-${{ hashFiles('executor/Cargo.toml') }}

      - name: Build executor
        run: cargo build --release --manifest-path executor/Cargo.toml

      - name: Install Python deps
        run: pip install -e ".[dev]"

      - name: Sandbox integration tests (real Rust binary)
        run: pytest -v tests/test_sandbox.py
