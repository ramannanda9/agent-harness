repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      # Scoped to the modules built under the typed-refactor effort. Extending
      # mypy to the rest of the codebase is a separate effort (pre-existing
      # untyped-error noise). args=[] so mypy uses the [tool.mypy] config
      # (files + follow_imports=silent) rather than only the changed paths.
      - id: mypy
        files: ^harness/(events|session_memory)\.py$
        args: []
